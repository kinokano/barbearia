    <style>
        /* ── Landing Page Specifics ──────────────── */
        .hero {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--color-black);
            color: var(--text-inverse);
            position: relative;
            overflow: hidden;
            padding-top: 72px;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 30% 50%, rgba(255,255,255,0.03) 0%, transparent 70%);
        }

        .hero__content {
            text-align: center;
            position: relative;
            z-index: 1;
            max-width: 720px;
            padding: var(--space-8);
        }

        .hero__tag {
            display: inline-block;
            font-size: var(--text-xs);
            font-weight: var(--font-semibold);
            letter-spacing: var(--tracking-wider);
            text-transform: uppercase;
            color: var(--color-gray-400);
            border: 1px solid var(--color-gray-700);
            padding: var(--space-2) var(--space-4);
            border-radius: var(--border-radius-full);
            margin-bottom: var(--space-8);
            animation: fadeIn 0.6s ease forwards;
        }

        .hero__title {
            font-family: var(--font-display);
            font-size: clamp(2.5rem, 8vw, 5rem);
            font-weight: var(--font-black);
            line-height: 1.05;
            letter-spacing: var(--tracking-tight);
            margin-bottom: var(--space-6);
            animation: slideUp 0.8s ease forwards;
        }

        .hero__subtitle {
            font-size: var(--text-lg);
            color: var(--color-gray-400);
            max-width: 480px;
            margin: 0 auto var(--space-10);
            line-height: var(--leading-relaxed);
            animation: slideUp 0.8s ease 0.1s both;
        }

        .hero__actions {
            display: flex;
            gap: var(--space-4);
            justify-content: center;
            flex-wrap: wrap;
            animation: slideUp 0.8s ease 0.2s both;
        }

        .hero__actions .btn--primary {
            background: var(--color-white);
            color: var(--color-black);
        }

        .hero__actions .btn--primary:hover {
            background: var(--color-gray-200);
        }

        .hero__actions .btn--secondary {
            border-color: var(--color-gray-600);
            color: var(--color-gray-300);
        }

        .hero__actions .btn--secondary:hover {
            border-color: var(--color-white);
            color: var(--color-white);
            background: transparent;
        }

        .hero__scroll {
            position: absolute;
            bottom: var(--space-8);
            left: 50%;
            transform: translateX(-50%);
            color: var(--color-gray-600);
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateX(-50%) translateY(0); }
            50% { transform: translateX(-50%) translateY(8px); }
        }

        /* ── Services Grid ───────────────────────── */
        .service-card {
            text-align: center;
            padding: var(--space-8);
        }

        .service-card__icon {
            width: 56px;
            height: 56px;
            background: var(--color-black);
            color: var(--color-white);
            border-radius: var(--border-radius-lg);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto var(--space-5);
            font-size: var(--text-xl);
        }

        .service-card__title {
            font-family: var(--font-display);
            font-size: var(--text-lg);
            font-weight: var(--font-bold);
            margin-bottom: var(--space-2);
        }

        .service-card__price {
            font-size: var(--text-2xl);
            font-weight: var(--font-bold);
            margin-top: var(--space-3);
        }

        .service-card__price span {
            font-size: var(--text-sm);
            font-weight: var(--font-regular);
            color: var(--text-secondary);
        }

        /* ── CTA Section ─────────────────────────── */
        .cta {
            background: var(--color-black);
            color: var(--text-inverse);
            padding: var(--space-20) 0;
        }

        .cta .btn--primary {
            background: var(--color-white);
            color: var(--color-black);
        }

        .cta .btn--primary:hover {
            background: var(--color-gray-200);
        }

        /* ── Stats ────────────────────────────────── */
        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: var(--space-8);
            text-align: center;
            padding: var(--space-12) 0;
        }

        .stats__number {
            font-family: var(--font-display);
            font-size: var(--text-4xl);
            font-weight: var(--font-black);
            line-height: 1;
            margin-bottom: var(--space-2);
        }

        .stats__label {
            font-size: var(--text-sm);
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: var(--tracking-wider);
        }

        @media (max-width: 640px) {
            .stats {
                grid-template-columns: 1fr;
                gap: var(--space-6);
            }
        }

        /* ── Modal Styles ────────────────────────── */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: var(--surface-overlay);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: var(--z-modal-backdrop);
            padding: var(--space-6);
        }

        .modal {
            background: var(--surface-elevated);
            border-radius: var(--border-radius-lg);
            width: 100%;
            max-width: 480px;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-xl);
        }

        .modal__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: var(--space-6) var(--space-6) 0;
        }

        .modal__title {
            font-family: var(--font-display);
            font-size: var(--text-xl);
            font-weight: var(--font-bold);
        }

        .modal__close {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--border-radius-sm);
            color: var(--text-tertiary);
            transition: all var(--transition-fast);
        }

        .modal__close:hover {
            background: var(--color-gray-100);
            color: var(--text-primary);
        }

        .modal__body {
            padding: var(--space-6);
        }

        .modal__footer {
            padding: 0 var(--space-6) var(--space-6);
            display: flex;
            justify-content: flex-end;
            gap: var(--space-3);
        }

        /* ── Toast Styles ────────────────────────── */
        .toast-container {
            position: fixed;
            bottom: var(--space-6);
            right: var(--space-6);
            z-index: var(--z-toast);
            display: flex;
            flex-direction: column;
            gap: var(--space-3);
            max-width: 380px;
        }

        .toast {
            display: flex;
            align-items: center;
            gap: var(--space-3);
            padding: var(--space-4) var(--space-5);
            background: var(--surface-elevated);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-md);
            box-shadow: var(--shadow-lg);
            transition: all var(--transition-base);
        }

        .toast__icon { font-size: var(--text-lg); flex-shrink: 0; }
        .toast__message { flex: 1; font-size: var(--text-sm); }
        .toast__close { color: var(--text-tertiary); font-size: var(--text-lg); flex-shrink: 0; }
        .toast__close:hover { color: var(--text-primary); }

        .toast--success { border-left: 3px solid var(--color-success); }
        .toast--success .toast__icon { color: var(--color-success); }
        .toast--error   { border-left: 3px solid var(--color-error); }
        .toast--error .toast__icon   { color: var(--color-error); }
        .toast--warning { border-left: 3px solid var(--color-warning); }
        .toast--warning .toast__icon { color: var(--color-warning); }
        .toast--info    { border-left: 3px solid var(--color-gray-400); }

        /* ── Datepicker Styles ───────────────────── */
        .datepicker {
            background: var(--surface-elevated);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius-lg);
            padding: var(--space-5);
        }

        .datepicker__header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: var(--space-4);
        }

        .datepicker__title {
            font-weight: var(--font-semibold);
            font-size: var(--text-sm);
        }

        .datepicker__nav {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--border-radius-sm);
            color: var(--text-secondary);
            transition: all var(--transition-fast);
        }

        .datepicker__nav:hover {
            background: var(--color-gray-100);
            color: var(--text-primary);
        }

        .datepicker__weekdays {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-bottom: var(--space-2);
        }

        .datepicker__weekday {
            text-align: center;
            font-size: var(--text-xs);
            font-weight: var(--font-semibold);
            color: var(--text-tertiary);
            padding: var(--space-2) 0;
            text-transform: uppercase;
        }

        .datepicker__days {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 2px;
        }

        .datepicker__day {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: var(--text-sm);
            border-radius: var(--border-radius-sm);
            cursor: pointer;
            transition: all var(--transition-fast);
        }

        .datepicker__day:hover:not(.datepicker__day--disabled):not(.datepicker__day--empty) {
            background: var(--color-gray-100);
        }

        .datepicker__day--today {
            font-weight: var(--font-bold);
            border: 1.5px solid var(--color-black);
        }

        .datepicker__day--selected {
            background: var(--color-black) !important;
            color: var(--color-white);
            font-weight: var(--font-semibold);
        }

        .datepicker__day--disabled {
            color: var(--color-gray-300);
            cursor: not-allowed;
        }

        .datepicker__day--empty {
            cursor: default;
        }

        /* ── Timeslot Grid Styles ────────────────── */
        .timeslot-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
            gap: var(--space-2);
        }

        .timeslot {
            padding: var(--space-3) var(--space-4);
            text-align: center;
            font-size: var(--text-sm);
            font-weight: var(--font-medium);
            border: 1.5px solid var(--border-color);
            border-radius: var(--border-radius-md);
            transition: all var(--transition-fast);
            cursor: pointer;
        }

        .timeslot:hover:not(.timeslot--disabled) {
            border-color: var(--color-black);
        }

        .timeslot--selected {
            background: var(--color-black);
            color: var(--color-white);
            border-color: var(--color-black);
        }

        .timeslot--disabled {
            color: var(--color-gray-300);
            border-color: var(--color-gray-100);
            cursor: not-allowed;
            text-decoration: line-through;
        }

        /* ── Spinner ─────────────────────────────── */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid var(--color-gray-200);
            border-top-color: var(--color-black);
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
