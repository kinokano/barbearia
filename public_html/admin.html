<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Painel administrativo da Barbearia Turetta.">
    <title>Admin — Barbearia Turetta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header class="header">
        <div class="header__container">
            <div class="header__brand">
                <span class="header__icon">✂</span>
                <h1 class="header__title">Barbearia Turetta</h1>
            </div>
            <nav class="header__nav">
                <a href="index.html" class="header__link">Agendamento</a>
            </nav>
        </div>
    </header>

    <main class="admin-layout">
        <div class="admin-header">
            <h2>Painel Administrativo</h2>
        </div>

        <div class="tab-bar" id="tab-bar">
            <button class="tab-btn active" data-tab="agenda">📅 Agenda</button>
            <button class="tab-btn" data-tab="clients">👥 Clientes</button>
        </div>

        <section id="tab-agenda" class="tab-content">
            <div class="filter-bar">
                <input type="date" id="filter-date" class="input" style="max-width:200px;">
                <button class="btn btn--primary" id="btn-filter-today">Hoje</button>
            </div>
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Horário</th>
                            <th>Cliente</th>
                            <th>WhatsApp</th>
                            <th>Profissional</th>
                            <th>Serviço</th>
                            <th>Status</th>
                            <th>Ações</th>
                        </tr>
                    </thead>
                    <tbody id="appointments-tbody"></tbody>
                </table>
            </div>
            <div class="empty-state" id="agenda-empty" style="display:none;">
                <div class="empty-state__icon">📋</div>
                <p>Nenhum agendamento encontrado.</p>
            </div>
        </section>

        <section id="tab-clients" class="tab-content" style="display:none;">
            <div class="table-wrapper">
                <table class="data-table">
                    <thead>
                        <tr>
                            <th>Nome</th>
                            <th>WhatsApp</th>
                            <th>Nascimento</th>
                            <th>Agendamentos</th>
                        </tr>
                    </thead>
                    <tbody id="clients-tbody"></tbody>
                </table>
            </div>
            <div class="empty-state" id="clients-empty" style="display:none;">
                <div class="empty-state__icon">👤</div>
                <p>Nenhum cliente cadastrado.</p>
            </div>
        </section>
    </main>

    <footer class="footer">
        <p>&copy; 2024 Barbearia Turetta — Painel Admin</p>
    </footer>

    <script src="js/admin.js"></script>
</body>
</html>
