<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Administrativo — Barbearia Turetta</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body style="display: flex; justify-content: center; align-items: center; min-height: 100vh; background-color: var(--bg-body);">
    
    <div style="background: white; padding: 2rem; border-radius: var(--radius-lg); box-shadow: var(--shadow-md); width: 100%; max-width: 400px;">
        <div style="text-align: center; margin-bottom: 2rem;">
            <span class="header__icon" style="font-size: 2rem; color: var(--primary);">✂</span>
            <h2 style="font-size: 1.5rem; font-weight: 600; margin-top: 0.5rem;">Painel Administrativo</h2>
            <p style="color: var(--text-muted); font-size: 0.9rem;">Faça login para gerenciar os agendamentos</p>
        </div>

        <form id="login-form">
            <div class="form-group">
                <label for="email" class="label">E-mail</label>
                <input type="email" id="email" class="input" placeholder="admin@turetta.com" required>
            </div>
            
            <div class="form-group">
                <label for="password" class="label">Senha</label>
                <input type="password" id="password" class="input" placeholder="••••••••" required>
            </div>

            <div id="login-error" style="color: #ef4444; font-size: 0.9rem; margin-bottom: 1rem; display: none;">
                Credenciais inválidas.
            </div>

            <button type="submit" id="btn-login" class="btn btn--primary" style="width: 100%;">Entrar no Painel</button>
        </form>
        <div style="text-align: center; margin-top: 1.5rem;">
            <a href="index.html" style="color: var(--primary); text-decoration: none; font-size: 0.9rem;">Voltar para o site</a>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
